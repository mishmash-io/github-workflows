name: Build and attest with maven

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '25'
        required: false
      skip-tests:
        type: boolean
        default: false
        required: false
    outputs:
      build-cache-key:
        description: A cache of the build, including dependencies
        value: ${{ jobs.build.outputs.build-cache-key }}
      build-artifacts-names:
        description: A JSON array containing the names of all artifacts maven built (poms, jars, etc)
        value: ${{ jobs.build.outputs.artifact-names }}
      build-artifact-id:
        description: The id of a build artifact containing a maven repo of what was built
        value: ${{ jobs.build.outputs.artifact-id }}
    secrets:
      MMIO_GPG_KEY:
        required: true
      MMIO_GPG_PASSPHRASE:
        required: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write
      artifact-metadata: write
    outputs:
      artifact-names: ${{ steps.artifacts.outputs.artifacts }}
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
      build-cache-key: ${{ steps.cache-key.outputs.build-cache-key }}

    steps:
    - name: Create build cache key
      id: cache-key
      run: echo build-cache-key="${{ runner.os }}-maven-${{ github.run_id }}-${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"
    - name: Checkout source code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Set up JDK ${{ inputs.java-version }}
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: ${{ inputs.java-version }}
        distribution: 'temurin'
        cache: maven
        gpg-private-key: ${{ secrets.MMIO_GPG_KEY }}
        gpg-passphrase: MMIO_GPG_PASSPHRASE
    - name: Build with Maven
      env:
        MAVEN_GPG_PASSPHRASE: ${{ secrets.MMIO_GPG_PASSPHRASE }}
      run: mvn clean deploy -DskipTests=${{ inputs.skip-tests }} spdx:createSPDX -Dproject.build.outputTimestamp=`date -u +"%FT%TZ"` -Dbuildinfo.ignoreJavadoc=false artifact:buildinfo --file pom.xml
    - name: Download deps for caching and offline tests
      run: mvn dependency:go-offline
    - name: Download additional deps to keep surefire plugin happy when offline
      # to be removed once maven-surefire-plugin allows using a custom junit platform version
      run: mvn dependency:get -Dartifact=org.junit.platform:junit-platform-launcher:1.12.2
    - name: Cache build artifacts and deps
      uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.m2/repository
        key: ${{ steps.cache-key.outputs.build-cache-key }}
    - name: Archive deployable maven repo
      id: upload
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: maven-deployable-repo
        path: /tmp/maven-repo/
    - name: Add asset to release
      if: ${{ github.event_name == 'release' }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: zip -r /tmp/maven-deployable-repo.zip /tmp/maven-repo/ && gh release upload "${{ github.ref_name }}" /tmp/maven-deployable-repo.zip
    - name: Extract artifact names
      id: artifacts
      run: echo artifacts=$(cat `find target/ -name \*.buildinfo` | grep '^outputs.*\.filename' | sed 's/.*=//' | jq -Rnc '[inputs]') >> "$GITHUB_OUTPUT"

  attest:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      matrix:
        artifact: ${{ fromJSON(needs.build.outputs.artifact-names) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Restore cached build artifacts
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.m2/repository
          key: ${{ needs.build.outputs.build-cache-key }}
          fail-on-cache-miss: true
      - name: Download build repo
        id: repo-download
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          artifact-ids: ${{ needs.build.outputs.artifact-id }}
      - name: Find the artifact
        id: find-artifact
        run: echo path=$(find . -name ${{ matrix.artifact }}) >> "$GITHUB_OUTPUT"
      - name: Upload the artifact
        id: upload-artifact
        if: ${{ steps.find-artifact.outputs.path != null && steps.find-artifact.outputs.path != '' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.artifact }}
          path: ${{ steps.find-artifact.outputs.path }}
      - name: Create attestation
        id: create-attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        if: ${{ github.event_name == 'release' && steps.upload-artifact.outcome == 'success' }}
        with:
          subject-path: ${{ steps.find-artifact.outputs.path }}
          subject-name: ${{ matrix.artifact }}
          push-to-registry: false
      - name: Find related SBOM
        id: find-sbom
        if: ${{ github.event_name == 'release' && steps.upload-artifact.outcome == 'success' && ! endsWith(steps.find-artifact.outputs.path, '.spdx.json') }}
        run: echo sbom-path=$(find `dirname -- ${{ steps.find-artifact.outputs.path }}` -name \*.spdx.json) >> "$GITHUB_OUTPUT"
      - name: Add SBOM attestation
        id: sbom-attestation
        if: ${{ github.event_name == 'release' && steps.find-sbom.outputs.sbom-path != null && steps.find-sbom.outputs.sbom-path != '' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.find-artifact.outputs.path }}
          sbom-path: ${{ steps.find-sbom.outputs.sbom-path }}
          push-to-registry: false
      - name: Upload release asset
        if: ${{ github.event_name == 'release' && steps.upload-artifact.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" ${{ steps.find-artifact.outputs.path }}
      - name: Upload release asset GPG signature
        if: ${{ github.event_name == 'release' && steps.upload-artifact.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ steps.find-artifact.outputs.path }}.asc"
      - name: Upload release asset SigStore signature
        if: ${{ github.event_name == 'release' && steps.create-attestation.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cp "${{ steps.create-attestation.outputs.bundle-path }}" "/tmp/${{ matrix.artifact }}.sigstore.json" && gh release upload "${{ github.ref_name }}" "/tmp/${{ matrix.artifact }}.sigstore.json"
      - name: Find related POM
        id: find-pom
        if: ${{ github.event_name == 'release' && steps.upload-artifact.outcome == 'success' && ! endsWith(steps.find-artifact.outputs.path, '.spdx.json') }}
        run: echo pom-path=$(if ${{ endsWith(steps.find-artifact.outputs.path, '.pom') }}; then echo ${{ steps.find-artifact.outputs.path }}; else find `dirname -- ${{ steps.find-artifact.outputs.path }}` -name \*.pom; fi) >> "$GITHUB_OUTPUT"
      - name: Get artifact groupId
        id: group-id
        if: ${{ github.event_name == 'release' && steps.find-pom.outcome == 'success' && steps.find-pom.outputs.pom-path != null && steps.find-pom.outputs.pom-path != '' }}
        run: echo maven-group-id=$(mvn help:evaluate -N -Dexpression="project.groupId" -DforceStdout -q --file ${{ steps.find-pom.outputs.pom-path }}) >> "$GITHUB_OUTPUT"
      - name: Get artifact version
        id: version
        if: ${{ github.event_name == 'release' && steps.find-pom.outcome == 'success' && steps.find-pom.outputs.pom-path != null && steps.find-pom.outputs.pom-path != '' }}
        run: echo maven-version=$(mvn help:evaluate -N -Dexpression="project.version" -DforceStdout -q --file ${{ steps.find-pom.outputs.pom-path }}) >> "$GITHUB_OUTPUT"
      - name: Create linked artifacts storage record
        if: ${{ github.event_name == 'release' && steps.group-id.outcome == 'success' && steps.group-id.outputs.maven-group-id != null && steps.group-id.outputs.maven-group-id != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" \
            /orgs/${{ github.repository_owner }}/artifacts/metadata/storage-record \
            -f "name=${{ matrix.artifact }}" \
            -f "version=${{ steps.version.outputs.maven-version }}" \
            -f "digest=sha256:$(sha256sum ${{ steps.find-artifact.outputs.path }} | sed 's/ .*//')" \
            -f "registry_url=https://repo1.maven.org/maven2/" \
            -f "repository=$(echo ${{ steps.group-id.outputs.maven-group-id }} | tr '.' '/')/" \
            -f "artifact_url=https://repo1.maven.org/maven2/$(echo ${{ steps.find-artifact.outputs.path }} | sed 's,^\./,,')" \
            -f "github_repository=$(echo ${{ github.repository }} | sed 's,.*/,,')"
        